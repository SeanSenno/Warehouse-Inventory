<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Re-Bath Warehouse Inventory</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;color:#6D6E70;background:#f4f5f7;min-height:100vh}
  .header{background:#435465;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .header-left{display:flex;align-items:center;gap:14px}
  .logo-wrap{background:white;border-radius:40px;padding:6px 16px}
  .logo-wrap span{font-family:Georgia,serif;color:#A90533;font-weight:bold;font-size:16px;letter-spacing:1px}
  .header-title{color:white;font-family:Georgia,serif;font-size:20px}
  .header-sub{color:#8CB6C9;font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:2px;margin-top:2px}
  .header-btns{display:flex;gap:8px;flex-wrap:wrap}
  .btn{font-family:Arial,sans-serif;font-weight:bold;border:none;border-radius:4px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;padding:9px 18px;font-size:11px}
  .btn-primary{background:#A90533;color:white}.btn-secondary{background:#435465;color:white}
  .btn-outline{background:transparent;color:#A90533;border:1px solid #A90533}
  .btn-blue{background:#8CB6C9;color:white}.btn-ghost{background:#EEEEEE;color:#6D6E70}
  .btn-sm{padding:5px 10px;font-size:10px}.btn:disabled{opacity:0.5;cursor:not-allowed}
  .stats-bar{background:white;border-bottom:2px solid #8CB6C9;padding:12px 24px;display:flex;gap:28px;flex-wrap:wrap}
  .stat{text-align:center;min-width:70px}
  .stat-num{font-family:Georgia,serif;font-size:26px;color:#435465;font-weight:bold;line-height:1}
  .stat-num.alert{color:#A90533}
  .stat-label{font-size:10px;color:#6D6E70;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
  .alert-bar{background:#fff3e0;border:1px solid #ffcc80;border-left:4px solid #e65100;padding:9px 24px;font-size:13px;color:#e65100}
  .sync-bar{padding:6px 24px;font-size:11px;background:white;border-bottom:1px solid #eee;min-height:28px;display:flex;align-items:center;gap:6px}
  .sync-bar.syncing{color:#8CB6C9}.sync-bar.ok{color:#2E7D32}.sync-bar.err{color:#A90533}
  .tabs{padding:0 24px;display:flex;border-bottom:2px solid #8CB6C9;background:#f4f5f7}
  .tab{padding:10px 20px;font-size:12px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;cursor:pointer;color:#6D6E70;border-bottom:3px solid transparent;margin-bottom:-2px}
  .tab.active{color:#435465;border-bottom-color:#A90533}
  .toolbar{padding:14px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:white;border-bottom:1px solid #eee}
  .inp{border:1px solid #ccc;border-radius:4px;padding:8px 11px;font-family:Arial,sans-serif;font-size:13px;color:#6D6E70}
  .inp-search{width:220px}
  .table-wrap{padding:0 24px 24px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;background:white;border:1px solid #ddd;font-size:13px;margin-top:14px}
  th{background:#435465;color:white;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1px;text-align:left;white-space:nowrap}
  td{padding:10px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
  tr:nth-child(even) td{background:#fafafa}
  .badge{padding:3px 9px;border-radius:12px;font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px}
  .b-ok{background:#e8f5e9;color:#2E7D32}.b-low{background:#fff3e0;color:#e65100}.b-out{background:#ffebee;color:#A90533}
  .cat-tag{background:#e8f0f5;color:#435465;padding:3px 9px;border-radius:3px;font-size:10px;font-weight:bold}
  .finish-tag{background:#f3ece8;color:#7a4030;padding:3px 9px;border-radius:3px;font-size:10px;font-weight:bold}
  .actions{display:flex;gap:5px}
  .qty-ok{color:#435465;font-size:17px;font-weight:bold}.qty-low{color:#e65100;font-size:17px;font-weight:bold}.qty-out{color:#A90533;font-size:17px;font-weight:bold}
  .sku-cell{font-size:11px;color:#aaa;font-weight:bold}
  .details-cell{font-size:12px;color:#888;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty-msg{text-align:center;padding:40px;color:#6D6E70}
  .log-wrap{padding:18px 24px}
  .log-entry{background:white;border:1px solid #eee;padding:11px 14px;margin-bottom:8px;border-radius:0 4px 4px 0;font-size:13px}
  .log-entry.out{border-left:4px solid #A90533}.log-entry.in{border-left:4px solid #2E7D32}
  .log-ts{font-size:11px;color:#aaa;margin-top:3px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center}
  .modal{background:white;border-radius:4px;border-top:4px solid #A90533;width:480px;max-width:95vw;max-height:90vh;overflow:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
  .modal-header{padding:18px 22px 14px;border-bottom:1px solid #EEEEEE;display:flex;justify-content:space-between;align-items:center}
  .modal-title{font-family:Georgia,serif;color:#435465;font-size:17px}
  .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#6D6E70;line-height:1}
  .modal-body{padding:18px 22px}.modal-footer{padding:14px 22px;border-top:1px solid #EEEEEE;display:flex;justify-content:flex-end;gap:8px}
  .field{margin-bottom:14px}
  .field-label{display:block;font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px;color:#435465;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;border:1px solid #ccc;border-radius:4px;padding:8px 11px;font-family:Arial,sans-serif;font-size:14px;color:#6D6E70}
  .field textarea{height:60px;resize:vertical}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .co-info{background:#EEEEEE;padding:10px 14px;border-radius:4px;margin-bottom:14px;font-size:13px}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid #8CB6C9;border-top-color:#435465;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:600px){
    .header{padding:12px 14px}.toolbar{padding:10px 14px}.table-wrap{padding:0 14px 20px}.log-wrap{padding:14px}
    .inp-search{width:100%}.g2{grid-template-columns:1fr}th,td{padding:8px 8px;font-size:12px}.actions{flex-direction:column;gap:4px}
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo-wrap"><span>Re-Bath</span></div>
    <div><div class="header-title">Warehouse Inventory</div><div class="header-sub">Re-Bath of New England</div></div>
  </div>
  <div class="header-btns">
    <button class="btn btn-primary" onclick="openAdd()">+ Add Item</button>
    <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-ghost btn-sm" id="sync-btn" onclick="loadData()">&#8635; Sync</button>
  </div>
</div>
<div id="sync-bar" class="sync-bar syncing"><span class="spinner"></span>&nbsp;Connecting to Google Sheets...</div>
<div id="stats-bar" class="stats-bar"></div>
<div id="alert-bar"></div>
<div class="tabs">
  <div class="tab active" id="tab-inv" onclick="switchTab('inv')">Inventory</div>
  <div class="tab" id="tab-log" onclick="switchTab('log')">Activity Log</div>
</div>
<div id="panel-inv">
  <div class="toolbar">
    <input class="inp inp-search" id="s-search" placeholder="Search name, SKU, finish..." oninput="renderTable()" />
    <select class="inp" id="s-cat" onchange="renderTable()">
      <option value="">All Categories</option>
      <option>Tubs &amp; Showers</option><option>Wall Surrounds</option><option>Fixtures &amp; Hardware</option>
      <option>Accessories</option><option>Tools &amp; Equipment</option><option>Plumbing Parts</option><option>Supplies</option>
    </select>
    <select class="inp" id="s-status" onchange="renderTable()">
      <option value="">All Statuses</option>
      <option value="ok">In Stock</option><option value="low">Low Stock</option><option value="out">Out of Stock</option>
    </select>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>SKU</th><th>Item Name</th><th>Details</th><th>Finish / Color</th><th>Category</th><th>Qty</th><th>Low At</th><th>Location</th><th>Status</th><th>Actions</th>
      </tr></thead>
      <tbody id="tbl-body"><tr><td colspan="10" class="empty-msg"><span class="spinner"></span>&nbsp;Loading...</td></tr></tbody>
    </table>
  </div>
</div>
<div id="panel-log" style="display:none"><div class="log-wrap" id="log-body"></div></div>
<div id="item-modal" style="display:none">
  <div class="overlay" onclick="if(event.target===this)closeIM()">
    <div class="modal">
      <div class="modal-header"><span class="modal-title" id="im-title">Add New Item</span><button class="modal-close" onclick="closeIM()">&#x2715;</button></div>
      <div class="modal-body">
        <div class="field"><label class="field-label">Item Name *</label><input id="f-name" placeholder="e.g. Alcove Tub 60x30" /></div>
        <div class="g2">
          <div class="field"><label class="field-label">SKU / Part #</label><input id="f-sku" placeholder="e.g. TUB-6030-WH" /></div>
          <div class="field"><label class="field-label">Category *</label>
            <select id="f-cat"><option value="">Select...</option>
              <option>Tubs &amp; Showers</option><option>Wall Surrounds</option><option>Fixtures &amp; Hardware</option>
              <option>Accessories</option><option>Tools &amp; Equipment</option><option>Plumbing Parts</option><option>Supplies</option>
            </select>
          </div>
        </div>
        <div class="g2">
          <div class="field"><label class="field-label">Finish / Color</label><input id="f-finish" placeholder="e.g. White, Bone, Chrome" /></div>
          <div class="field"><label class="field-label">Warehouse Location</label><input id="f-loc" placeholder="e.g. Aisle 3, Shelf B" /></div>
        </div>
        <div class="field"><label class="field-label">Details</label><textarea id="f-details" placeholder="Size, model #, supplier, specs, reorder info..."></textarea></div>
        <div class="g2">
          <div class="field"><label class="field-label">Quantity *</label><input id="f-qty" type="number" min="0" placeholder="0" /></div>
          <div class="field"><label class="field-label">Low Stock Alert At</label><input id="f-thr" type="number" min="0" placeholder="5" /></div>
        </div>
        <div class="g2">
          <div class="field"><label class="field-label">Material Cost ($)</label><input id="f-cost" type="number" min="0" step="0.01" placeholder="0.00" /></div>
          <div class="field"><label class="field-label">Notes</label><input id="f-notes" placeholder="Additional notes..." /></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeIM()">Cancel</button>
        <button class="btn btn-primary" id="im-save-btn" onclick="saveItem()">Save Item</button>
      </div>
    </div>
  </div>
</div>
<div id="co-modal" style="display:none">
  <div class="overlay" onclick="if(event.target===this)closeCO()">
    <div class="modal">
      <div class="modal-header"><span class="modal-title" id="co-title"></span><button class="modal-close" onclick="closeCO()">&#x2715;</button></div>
      <div class="modal-body">
        <div class="co-info" id="co-info"></div>
        <div class="field"><label class="field-label">Action</label>
          <select id="co-action"><option value="out">Check Out (Remove from stock)</option><option value="in">Check In (Add to stock)</option></select>
        </div>
        <div class="g2">
          <div class="field"><label class="field-label">Quantity</label><input id="co-qty" type="number" min="1" value="1" /></div>
          <div class="field"><label class="field-label">Team Member</label><input id="co-person" placeholder="Name" /></div>
        </div>
        <div class="field"><label class="field-label">Job / Reason</label><input id="co-reason" placeholder="e.g. Job #1042 Smith bathroom" /></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeCO()">Cancel</button>
        <button class="btn btn-primary" id="co-save-btn" onclick="processCO()">Confirm</button>
      </div>
    </div>
  </div>
</div>
<script>
const PROXY='https://script.google.com/macros/s/AKfycbxmKcUMX_kQ51jDcsnnBEggjnwc15l-PW1kbb7O5ndvs1hZn2Z9g3emQnhJlMQ0k-wSgQ/exec';
const HEADERS=['ID','Name','SKU','Category','Finish/Color','Details','Qty','Threshold','Location','Notes','Material Cost'];
let items=[],log=[],editId=null,coId=null,nextId=1;
function setSync(msg,type){const el=document.getElementById('sync-bar');el.className='sync-bar '+(type||'syncing');el.innerHTML=(type==='syncing'||!type)?'<span class="spinner"></span>&nbsp;'+msg:msg;}
async function apiFetch(url,opts){const r=await fetch(url,opts);const text=await r.text();try{return JSON.parse(text);}catch(e){throw new Error('Bad response: '+text.slice(0,100));}}
async function loadData(){setSync('Syncing from Google Sheets...','syncing');document.getElementById('sync-btn').disabled=true;try{const[invRes,logRes]=await Promise.all([apiFetch(PROXY+'?action=getInventory'),apiFetch(PROXY+'?action=getLog')]);parseInventory(invRes);parseLog(logRes);setSync('Synced '+items.length+' items &mdash; '+new Date().toLocaleTimeString(),'ok');}catch(e){setSync('Sync error: '+e.message,'err');}document.getElementById('sync-btn').disabled=false;renderAll();}
function parseInventory(rows){if(!rows||rows.length<2){items=[];return;}items=rows.slice(1).map(r=>({id:parseInt(r[0])||nextId++,name:r[1]||'',sku:r[2]||'',category:r[3]||'',finish:r[4]||'',details:r[5]||'',qty:parseInt(r[6])||0,threshold:parseInt(r[7])||0,location:r[8]||'',notes:r[9]||'',cost:r[10]||''})).filter(i=>i.name.trim());if(items.length)nextId=Math.max(...items.map(i=>i.id))+1;}
function parseLog(rows){if(!rows||rows.length<2){log=[];return;}log=rows.slice(1).map(r=>({timestamp:r[0]||'',action:r[1]||'out',itemId:r[2]||'',itemName:r[3]||'',qty:parseInt(r[4])||1,person:r[5]||'',reason:r[6]||''}));}
async function saveInventory(){const data=[HEADERS,...items.map(i=>[i.id,i.name,i.sku,i.category,i.finish,i.details,i.qty,i.threshold,i.location,i.notes,i.cost])];await apiFetch(PROXY,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'saveInventory',data})});}
async function appendLog(entry){await apiFetch(PROXY,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'appendLog',row:[entry.timestamp,entry.action,entry.itemId,entry.itemName,entry.qty,entry.person,entry.reason]})});}
function getStatus(item){if(item.qty===0)return'out';if(item.threshold&&item.qty<=item.threshold)return'low';return'ok';}
function renderStats(){const total=items.length,out=items.filter(i=>getStatus(i)==='out').length,low=items.filter(i=>getStatus(i)==='low').length;document.getElementById('stats-bar').innerHTML=[{n:total,l:'Total Items',a:false},{n:total-out-low,l:'In Stock',a:false},{n:low,l:'Low Stock',a:true},{n:out,l:'Out of Stock',a:true}].map(s=>`<div class="stat"><div class="stat-num ${s.a&&s.n>0?'alert':''}">${s.n}</div><div class="stat-label">${s.l}</div></div>`).join('');const c=low+out;document.getElementById('alert-bar').innerHTML=c>0?`<div class="alert-bar">&#9888; <strong>${c} item${c>1?'s':''}</strong> are low or out of stock. Review and reorder.</div>`:'';}
function renderTable(){const s=document.getElementById('s-search').value.toLowerCase(),cat=document.getElementById('s-cat').value,st=document.getElementById('s-status').value;const filtered=items.filter(i=>{const ms=!s||i.name.toLowerCase().includes(s)||i.sku.toLowerCase().includes(s)||(i.finish&&i.finish.toLowerCase().includes(s));return ms&&(!cat||i.category===cat)&&(!st||getStatus(i)===st);});const tbody=document.getElementById('tbl-body');if(!filtered.length){tbody.innerHTML=`<tr><td colspan="10" class="empty-msg">${items.length?'No items match your filters.':'No items yet. Tap + Add Item to get started.'}</td></tr>`;return;}const bMap={ok:'b-ok',low:'b-low',out:'b-out'},lMap={ok:'In Stock',low:'Low Stock',out:'Out of Stock'},qMap={ok:'qty-ok',low:'qty-low',out:'qty-out'};tbody.innerHTML=filtered.map(item=>{const s=getStatus(item);return`<tr><td class="sku-cell">${item.sku||'&mdash;'}</td><td style="font-weight:600;color:#435465">${item.name}</td><td class="details-cell" title="${item.details||''}">${item.details||'&mdash;'}</td><td>${item.finish?'<span class="finish-tag">'+item.finish+'</span>':'<span style="color:#ccc">&mdash;</span>'}</td><td><span class="cat-tag">${item.category}</span></td><td class="${qMap[s]}">${item.qty}</td><td style="color:#aaa">${item.threshold||'&mdash;'}</td><td style="font-size:12px">${item.location||'&mdash;'}</td><td><span class="badge ${bMap[s]}">${lMap[s]}</span></td><td><div class="actions"><button class="btn btn-blue btn-sm" onclick="openCO(${item.id})">In/Out</button><button class="btn btn-secondary btn-sm" onclick="openEdit(${item.id})">Edit</button><button class="btn btn-outline btn-sm" onclick="delItem(${item.id})">Del</button></div></td></tr>`;}).join('');}
function renderLog(){const el=document.getElementById('log-body');if(!log.length){el.innerHTML=`<div class="empty-msg" style="padding:48px"><div style="font-family:Georgia,serif;color:#435465;font-size:20px;margin-bottom:8px">No Activity Yet</div><div>Check-in and check-out activity will appear here.</div></div>`;return;}el.innerHTML=[...log].reverse().map(e=>`<div class="log-entry ${e.action}"><div><strong style="color:#435465">${e.action==='out'?'&#8593; Checked Out':'&#8595; Checked In'}</strong>&nbsp;${e.qty}&times;${e.itemName}${e.person?' &nbsp;&middot;&nbsp; <strong>'+e.person+'</strong>':''}${e.reason?' &nbsp;&middot;&nbsp; '+e.reason:''}</div><div class="log-ts">${e.timestamp}</div></div>`).join('');}
function renderAll(){renderStats();renderTable();renderLog();}
function switchTab(t){document.getElementById('panel-inv').style.display=t==='inv'?'':'none';document.getElementById('panel-log').style.display=t==='log'?'':'none';document.getElementById('tab-inv').className='tab'+(t==='inv'?' active':'');document.getElementById('tab-log').className='tab'+(t==='log'?' active':'');}
function openAdd(){editId=null;document.getElementById('im-title').textContent='Add New Item';['f-name','f-sku','f-qty','f-thr','f-loc','f-notes','f-finish','f-details','f-cost'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-cat').value='';document.getElementById('item-modal').style.display='';}
function openEdit(id){const item=items.find(i=>i.id===id);if(!item)return;editId=id;document.getElementById('im-title').textContent='Edit Item';document.getElementById('f-name').value=item.name;document.getElementById('f-sku').value=item.sku;document.getElementById('f-cat').value=item.category;document.getElementById('f-finish').value=item.finish;document.getElementById('f-details').value=item.details;document.getElementById('f-qty').value=item.qty;document.getElementById('f-thr').value=item.threshold;document.getElementById('f-loc').value=item.location;document.getElementById('f-notes').value=item.notes;document.getElementById('f-cost').value=item.cost;document.getElementById('item-modal').style.display='';}
function closeIM(){document.getElementById('item-modal').style.display='none';}
async function saveItem(){const name=document.getElementById('f-name').value.trim(),cat=document.getElementById('f-cat').value;if(!name||!cat){alert('Name and Category are required.');return;}const btn=document.getElementById('im-save-btn');btn.disabled=true;btn.textContent='Saving...';const data={name,sku:document.getElementById('f-sku').value,category:cat,finish:document.getElementById('f-finish').value,details:document.getElementById('f-details').value,qty:parseInt(document.getElementById('f-qty').value)||0,threshold:parseInt(document.getElementById('f-thr').value)||0,location:document.getElementById('f-loc').value,notes:document.getElementById('f-notes').value,cost:document.getElementById('f-cost').value};if(editId!==null){items=items.map(i=>i.id===editId?{...i,...data}:i);}else{items.push({...data,id:nextId++});}closeIM();renderAll();setSync('Saving to Google Sheets...','syncing');try{await saveInventory();setSync('Saved successfully','ok');}catch(e){setSync('Save error: '+e.message,'err');}btn.disabled=false;btn.textContent='Save Item';}
async function delItem(id){if(!confirm('Delete this item?'))return;items=items.filter(i=>i.id!==id);renderAll();setSync('Saving...','syncing');try{await saveInventory();setSync('Deleted and saved','ok');}catch(e){setSync('Save error: '+e.message,'err');}}
function openCO(id){coId=id;const item=items.find(i=>i.id===id);if(!item)return;document.getElementById('co-title').textContent=item.name;document.getElementById('co-info').innerHTML=`<strong>SKU:</strong> ${item.sku||'N/A'} &nbsp;&middot;&nbsp; <strong>Finish:</strong> ${item.finish||'N/A'} &nbsp;&middot;&nbsp; <strong>Qty:</strong> ${item.qty}`;document.getElementById('co-action').value='out';document.getElementById('co-qty').value=1;document.getElementById('co-person').value='';document.getElementById('co-reason').value='';document.getElementById('co-modal').style.display='';}
function closeCO(){document.getElementById('co-modal').style.display='none';}
async function processCO(){const item=items.find(i=>i.id===coId);if(!item)return;const action=document.getElementById('co-action').value,qty=parseInt(document.getElementById('co-qty').value)||1,person=document.getElementById('co-person').value,reason=document.getElementById('co-reason').value;if(action==='out'&&qty>item.qty){alert('Only '+item.qty+' in stock.');return;}const btn=document.getElementById('co-save-btn');btn.disabled=true;btn.textContent='Saving...';items=items.map(i=>i.id===coId?{...i,qty:action==='out'?i.qty-qty:i.qty+qty}:i);const entry={timestamp:new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}),action,itemId:coId,itemName:item.name,qty,person,reason};log.push(entry);closeCO();renderAll();setSync('Saving to Google Sheets...','syncing');try{await Promise.all([saveInventory(),appendLog(entry)]);setSync('Saved successfully','ok');}catch(e){setSync('Save error: '+e.message,'err');}btn.disabled=false;btn.textContent='Confirm';}
function exportCSV(){if(!items.length){alert('No items to export.');return;}const h=['SKU','Item Name','Details','Finish/Color','Category','Quantity','Low Stock At','Location','Status','Notes','Material Cost'];const rows=items.map(i=>[i.sku||'',i.name,i.details||'',i.finish||'',i.category,i.qty,i.threshold||'',i.location||'',getStatus(i),i.notes||'',i.cost||'']);const csv=[h,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='rebath-inventory-'+new Date().toISOString().slice(0,10)+'.csv';a.click();}
loadData();
</script>
