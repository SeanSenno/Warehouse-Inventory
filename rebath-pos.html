<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Re-Bath — Material Pull</title>
<style>
  :root {
    --rb-red:        #A90533;
    --rb-slate:      #435465;
    --rb-white:      #FFFFFF;
    --rb-clean-blue: #8CB6C9;
    --rb-dark-grey:  #6D6E70;
    --rb-light-grey: #EEEEEE;
    --rb-green:      #2E7D32;
    --rb-font-heading: Georgia, 'Times New Roman', serif;
    --rb-font-body:    Arial, Helvetica, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--rb-font-body); background: var(--rb-light-grey); color: var(--rb-dark-grey); min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--rb-slate); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  header h1 { font-family: var(--rb-font-heading); font-size: 20px; color: var(--rb-white); letter-spacing: 0.5px; }
  .header-right { font-size: 12px; color: var(--rb-clean-blue); text-align: right; white-space: nowrap; }
  main { flex: 1; display: grid; grid-template-columns: 1fr 380px; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
  .card { background: var(--rb-white); border-radius: 6px; border: 1px solid #ddd; overflow: hidden; }
  .card-header { background: var(--rb-slate); color: var(--rb-white); padding: 12px 20px; font-family: var(--rb-font-heading); font-size: 15px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
  .card-header .step-badge { background: var(--rb-red); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }
  .card-body { padding: 20px; }
  .field-group { margin-bottom: 16px; }
  .field-group:last-child { margin-bottom: 0; }
  label { display: block; font-size: 12px; font-weight: bold; color: var(--rb-slate); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 11px 14px; border: 2px solid #ddd; border-radius: 4px; font-family: var(--rb-font-body); font-size: 15px; color: var(--rb-dark-grey); background: var(--rb-white); transition: border-color 0.15s; appearance: none; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--rb-clean-blue); }
  input::placeholder, textarea::placeholder { color: #bbb; }
  textarea { resize: none; height: 72px; }
  .sku-search-wrap { position: relative; margin-bottom: 10px; }
  .sku-search-input { width: 100%; padding: 11px 14px 11px 38px; border: 2px solid #ddd; border-radius: 4px; font-family: var(--rb-font-body); font-size: 15px; color: var(--rb-dark-grey); background: var(--rb-white); transition: border-color 0.15s; }
  .sku-search-input:focus { outline: none; border-color: var(--rb-clean-blue); }
  .sku-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #bbb; pointer-events: none; }
  .sku-results { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 2px solid var(--rb-clean-blue); border-radius: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); max-height: 220px; overflow-y: auto; z-index: 50; display: none; }
  .sku-results.show { display: block; }
  .sku-result-item { padding: 11px 14px; cursor: pointer; border-bottom: 1px solid var(--rb-light-grey); transition: background 0.1s; }
  .sku-result-item:last-child { border-bottom: none; }
  .sku-result-item:hover { background: var(--rb-light-grey); }
  .sku-result-sku { font-size: 11px; font-weight: bold; color: var(--rb-red); text-transform: uppercase; }
  .sku-result-name { font-size: 14px; font-weight: bold; color: var(--rb-slate); margin-top: 2px; }
  .sku-result-meta { font-size: 12px; color: #999; margin-top: 2px; }
  .sku-selected-display { background: #e8f0f5; border: 2px solid var(--rb-clean-blue); border-radius: 4px; padding: 10px 14px; display: none; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .sku-selected-display.show { display: flex; }
  .sku-selected-info { font-size: 14px; color: var(--rb-slate); }
  .sku-clear-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 20px; padding: 2px 6px; transition: color 0.15s; line-height: 1; }
  .sku-clear-btn:hover { color: var(--rb-red); }
  .sku-row { display: grid; grid-template-columns: 100px auto; gap: 10px; align-items: end; }
  .btn { padding: 11px 20px; border: none; border-radius: 4px; font-family: var(--rb-font-body); font-size: 14px; font-weight: bold; cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn-primary { background: var(--rb-slate); color: var(--rb-white); }
  .btn-primary:hover:not(:disabled) { background: #354d5c; }
  .btn-add { background: var(--rb-clean-blue); color: var(--rb-white); padding: 11px 16px; }
  .btn-add:hover:not(:disabled) { background: #7aa5ba; }
  .btn-complete { background: var(--rb-red); color: var(--rb-white); width: 100%; padding: 16px; font-size: 16px; letter-spacing: 0.5px; border-radius: 4px; margin-top: 16px; }
  .btn-complete:hover:not(:disabled) { background: #8f0429; }
  .btn-clear { background: transparent; color: var(--rb-dark-grey); border: 1px solid #ccc; padding: 8px 14px; font-size: 13px; }
  .btn-clear:hover { background: var(--rb-light-grey); }
  .cart-empty { text-align: center; padding: 32px 20px; color: #bbb; font-size: 14px; }
  .cart-empty svg { display: block; margin: 0 auto 10px; opacity: 0.3; }
  .cart-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--rb-light-grey); }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 14px; font-weight: bold; color: var(--rb-slate); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-sku { font-size: 11px; color: #999; margin-top: 2px; }
  .cart-item-pricing { font-size: 13px; color: var(--rb-dark-grey); margin-top: 4px; }
  .cart-item-remove { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; line-height: 1; padding: 2px; flex-shrink: 0; transition: color 0.15s; }
  .cart-item-remove:hover { color: var(--rb-red); }
  .cart-total { background: var(--rb-light-grey); border-radius: 4px; padding: 14px 16px; margin-top: 16px; display: flex; justify-content: space-between; align-items: center; }
  .cart-total-label { font-size: 13px; font-weight: bold; color: var(--rb-slate); text-transform: uppercase; letter-spacing: 0.5px; }
  .cart-total-amount { font-family: var(--rb-font-heading); font-size: 22px; font-weight: bold; color: var(--rb-slate); }
  .cart-count-badge { background: var(--rb-red); color: white; border-radius: 10px; padding: 2px 8px; font-size: 11px; margin-left: auto; }
  .cart-header-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .status-bar { text-align: center; padding: 10px 20px; font-size: 13px; font-weight: bold; border-top: 3px solid transparent; min-height: 44px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s; }
  .status-bar.idle { color: #aaa; }
  .status-bar.loading { background: #fffbea; border-color: #f0c040; color: #7a6000; }
  .status-bar.success { background: #edf7ed; border-color: var(--rb-green); color: var(--rb-green); }
  .status-bar.error { background: #fdecea; border-color: var(--rb-red); color: var(--rb-red); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 24px; }
  .overlay.show { display: flex; }
  .overlay-card { background: white; border-radius: 8px; padding: 40px 48px; text-align: center; max-width: 460px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .overlay-icon { width: 64px; height: 64px; background: var(--rb-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .overlay-icon svg { color: white; }
  .overlay-card h2 { font-family: var(--rb-font-heading); font-size: 26px; color: var(--rb-slate); margin-bottom: 10px; }
  .overlay-card p { font-size: 15px; color: var(--rb-dark-grey); margin-bottom: 28px; line-height: 1.5; }
  .overlay-card .btn-primary { padding: 14px 40px; font-size: 15px; }
  .spinner { width: 18px; height: 18px; border: 3px solid rgba(0,0,0,0.15); border-top-color: currentColor; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 820px) {
    main { grid-template-columns: 1fr; padding: 12px; gap: 12px; }
    .sku-row { grid-template-columns: 80px auto; gap: 8px; }
    header h1 { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>Material Pull Station</h1>
  <div class="header-right">Warehouse Operations<br>Re-Bath of New England</div>
</header>

<main>
  <div style="display:flex;flex-direction:column;gap:16px;">
    <div class="card">
      <div class="card-header"><span class="step-badge">1</span> Job Information</div>
      <div class="card-body">
        <div class="field-group">
          <label for="installerName">Installer Name</label>
          <input type="text" id="installerName" placeholder="Your full name" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="customerName">Customer / Job Name</label>
          <input type="text" id="customerName" placeholder="Customer name or job reference" autocomplete="off">
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="step-badge">2</span> Add Items to Cart</div>
      <div class="card-body">
        <div class="field-group">
          <label>Search SKU or Item Name</label>
          <div class="sku-search-wrap">
            <svg class="sku-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="sku-search-input" id="skuSearch" placeholder="Type SKU or item name…" autocomplete="off" autocorrect="off" autocapitalize="off">
            <div class="sku-results" id="skuResults"></div>
          </div>
          <div class="sku-selected-display" id="skuSelectedDisplay">
            <div class="sku-selected-info">
              <span id="skuSelectedSku" style="font-size:11px;font-weight:bold;color:var(--rb-red);text-transform:uppercase;display:block;"></span>
              <strong id="skuSelectedName" style="display:block;font-size:15px;"></strong>
              <span id="skuSelectedMeta" style="font-size:12px;color:#999;"></span>
            </div>
            <button class="sku-clear-btn" onclick="clearSkuSelection()" title="Clear">×</button>
          </div>
          <div class="sku-row">
            <input type="number" id="qtyInput" placeholder="Qty" min="1" value="1">
            <button class="btn btn-add" id="addToCartBtn" onclick="addToCart()" disabled>Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="step-badge">3</span> Notes <span style="font-weight:normal;font-size:12px;opacity:0.7;margin-left:6px;">(optional)</span></div>
      <div class="card-body">
        <textarea id="pullNotes" placeholder="Any notes about this pull — partial items, substitutions, special instructions…"></textarea>
      </div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:16px;">
    <div class="card" style="flex:1;display:flex;flex-direction:column;">
      <div class="card-header">
        <div class="cart-header-row">
          <span style="display:flex;align-items:center;gap:8px;"><span class="step-badge">4</span> Cart</span>
          <span id="cartBadge" class="cart-count-badge" style="display:none;"></span>
        </div>
      </div>
      <div class="card-body" style="flex:1;overflow-y:auto;max-height:420px;">
        <div id="cartEmpty" class="cart-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          No items yet.<br>Search a SKU and add it above.
        </div>
        <div id="cartItems"></div>
      </div>
      <div style="padding:0 20px 20px;">
        <div class="cart-total">
          <span class="cart-total-label">Total Material Cost</span>
          <span class="cart-total-amount" id="cartTotal">$0.00</span>
        </div>
        <button class="btn btn-complete" id="completeBtn" onclick="completePull()" disabled>Complete Pull &amp; Send Receipt</button>
        <div style="text-align:center;margin-top:10px;">
          <button class="btn btn-clear" onclick="clearCart()">Clear Cart</button>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="status-bar idle" id="statusBar">Ready</div>

<div class="overlay" id="successOverlay">
  <div class="overlay-card">
    <div class="overlay-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>Pull Complete</h2>
    <p id="overlayMsg">Inventory updated and receipt sent to the production team.</p>
    <button class="btn btn-primary" onclick="resetForm()">Start New Pull</button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmKcUMX_kQ51jDcsnnBEggjnwc15l-PW1kbb7O5ndvs1hZn2Z9g3emQnhJlMQ0k-wSgQ/exec';
let inventory = [];
let cart = [];
let selectedSku = null;

document.addEventListener('DOMContentLoaded', () => {
  loadInventory();
  document.getElementById('skuSearch').addEventListener('input', onSkuSearch);
  document.addEventListener('click', e => { if (!e.target.closest('.sku-search-wrap')) closeSkuResults(); });
  document.getElementById('installerName').addEventListener('input', updateCompleteBtn);
  document.getElementById('customerName').addEventListener('input', updateCompleteBtn);
});

async function loadInventory() {
  setStatus('loading', 'Loading inventory…');
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getPOSInventory`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    inventory = (data.items || []).filter(i => i.qty > 0);
    if (!inventory.length) document.getElementById('skuSearch').placeholder = '— No items in stock —';
    setStatus('idle', 'Ready');
  } catch (err) {
    setStatus('error', 'Could not load inventory. Check connection.');
    document.getElementById('skuSearch').placeholder = '— Failed to load. Check connection —';
  }
}

function onSkuSearch() {
  const q = document.getElementById('skuSearch').value.trim().toLowerCase();
  const results = document.getElementById('skuResults');
  if (!q) { closeSkuResults(); return; }
  const matches = inventory.filter(i =>
    i.sku.toLowerCase().includes(q) ||
    i.name.toLowerCase().includes(q) ||
    (i.finishColor && i.finishColor.toLowerCase().includes(q))
  ).slice(0, 12);
  if (!matches.length) {
    results.innerHTML = '<div style="padding:12px 14px;color:#999;font-size:13px;">No items found.</div>';
    results.classList.add('show');
    return;
  }
  results.innerHTML = matches.map(i => {
    const price = i.unitPrice ? '$' + parseFloat(i.unitPrice).toFixed(2) + ' / unit' : 'No price on file';
    return '<div class="sku-result-item" onclick="selectSku(\'' + i.sku.replace(/'/g, "\\'") + '\')">' +
      '<div class="sku-result-sku">' + i.sku + '</div>' +
      '<div class="sku-result-name">' + i.name + (i.finishColor ? ' <span style="font-weight:normal;color:#999;">/ ' + i.finishColor + '</span>' : '') + '</div>' +
      '<div class="sku-result-meta">' + (i.category || '') + ' · ' + price + ' · ' + i.qty + ' in stock</div>' +
      '</div>';
  }).join('');
  results.classList.add('show');
}

function selectSku(sku) {
  const item = inventory.find(i => i.sku === sku);
  if (!item) return;
  selectedSku = sku;
  document.getElementById('skuSearch').value = '';
  closeSkuResults();
  const price = item.unitPrice ? '$' + parseFloat(item.unitPrice).toFixed(2) + ' / unit' : 'No price on file';
  document.getElementById('skuSelectedSku').textContent = item.sku;
  document.getElementById('skuSelectedName').textContent = item.name + (item.finishColor ? ' / ' + item.finishColor : '');
  document.getElementById('skuSelectedMeta').textContent = (item.category || '') + ' · ' + price + ' · ' + item.qty + ' in stock';
  document.getElementById('skuSelectedDisplay').classList.add('show');
  document.getElementById('qtyInput').max = item.qty;
  document.getElementById('qtyInput').focus();
  document.getElementById('addToCartBtn').disabled = false;
}

function clearSkuSelection() {
  selectedSku = null;
  document.getElementById('skuSelectedDisplay').classList.remove('show');
  document.getElementById('addToCartBtn').disabled = true;
  document.getElementById('skuSearch').value = '';
  document.getElementById('skuSearch').focus();
}

function closeSkuResults() {
  const r = document.getElementById('skuResults');
  r.classList.remove('show');
  r.innerHTML = '';
}

function addToCart() {
  const sku = selectedSku;
  const qty = parseInt(document.getElementById('qtyInput').value, 10);
  if (!sku) { setStatus('error', 'Search and select a SKU first.'); return; }
  if (!qty || qty < 1) { setStatus('error', 'Enter a valid quantity.'); return; }
  const item = inventory.find(i => i.sku === sku);
  if (!item) return;
  if (qty > item.qty) { setStatus('error', `Only ${item.qty} in stock for ${sku}.`); return; }
  const existing = cart.find(c => c.sku === sku);
  if (existing) {
    const newQty = existing.qty + qty;
    if (newQty > item.qty) { setStatus('error', `Total qty (${newQty}) exceeds stock (${item.qty}) for ${sku}.`); return; }
    existing.qty = newQty;
    existing.lineTotal = existing.qty * (existing.unitPrice || 0);
  } else {
    const unitPrice = parseFloat(item.unitPrice) || 0;
    cart.push({ id: item.id, sku: item.sku, name: item.name, unitPrice, qty, lineTotal: qty * unitPrice });
  }
  renderCart();
  clearSkuSelection();
  document.getElementById('qtyInput').value = '1';
  setStatus('idle', `${item.name} added to cart.`);
}

function removeFromCart(sku) {
  cart = cart.filter(c => c.sku !== sku);
  renderCart();
  updateCompleteBtn();
  if (!cart.length) setStatus('idle', 'Ready');
}

function clearCart() {
  if (!cart.length) return;
  if (!confirm('Clear all items from cart?')) return;
  cart = [];
  renderCart();
  setStatus('idle', 'Cart cleared.');
}

function renderCart() {
  const empty = document.getElementById('cartEmpty');
  const items = document.getElementById('cartItems');
  const badge = document.getElementById('cartBadge');
  const totalEl = document.getElementById('cartTotal');
  if (!cart.length) {
    empty.style.display = '';
    items.innerHTML = '';
    badge.style.display = 'none';
    totalEl.textContent = '$0.00';
    updateCompleteBtn();
    return;
  }
  empty.style.display = 'none';
  const total = cart.reduce((s, c) => s + c.lineTotal, 0);
  totalEl.textContent = `$${total.toFixed(2)}`;
  badge.style.display = '';
  const totalUnits = cart.reduce((s, c) => s + c.qty, 0);
  badge.textContent = `${cart.length} SKU${cart.length !== 1 ? 's' : ''} · ${totalUnits} unit${totalUnits !== 1 ? 's' : ''}`;
  items.innerHTML = cart.map(c => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${c.name}</div>
        <div class="cart-item-sku">SKU: ${c.sku}</div>
        <div class="cart-item-pricing">${c.qty} × $${c.unitPrice.toFixed(2)} = <strong>$${c.lineTotal.toFixed(2)}</strong></div>
      </div>
      <button class="cart-item-remove" onclick="removeFromCart('${c.sku}')" title="Remove">×</button>
    </div>`).join('');
  updateCompleteBtn();
}

function updateCompleteBtn() {
  const installer = document.getElementById('installerName').value.trim();
  const customer = document.getElementById('customerName').value.trim();
  document.getElementById('completeBtn').disabled = !(installer && customer && cart.length);
}

async function completePull() {
  const installer = document.getElementById('installerName').value.trim();
  const customer = document.getElementById('customerName').value.trim();
  const notes = document.getElementById('pullNotes').value.trim();
  if (!installer || !customer || !cart.length) return;
  const total = cart.reduce((s, c) => s + c.lineTotal, 0);
  const payload = {
    action: 'completePull', installer, customer, notes,
    total: total.toFixed(2),
    items: cart.map(c => ({ id: c.id, sku: c.sku, name: c.name, qty: c.qty, unitPrice: c.unitPrice.toFixed(2), lineTotal: c.lineTotal.toFixed(2) }))
  };
  document.getElementById('completeBtn').disabled = true;
  setStatus('loading', 'Submitting pull — updating inventory and sending receipt…');
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    await loadInventory();
    document.getElementById('overlayMsg').textContent = `Inventory updated and receipt sent to the production team. Total: $${total.toFixed(2)}`;
    document.getElementById('successOverlay').classList.add('show');
    setStatus('success', 'Pull complete. Receipt sent.');
  } catch (err) {
    setStatus('error', `Submission failed: ${err.message}. Please try again or contact the office.`);
    document.getElementById('completeBtn').disabled = false;
  }
}

function resetForm() {
  cart = [];
  document.getElementById('installerName').value = '';
  document.getElementById('customerName').value = '';
  document.getElementById('pullNotes').value = '';
  document.getElementById('qtyInput').value = '1';
  clearSkuSelection();
  renderCart();
  document.getElementById('successOverlay').classList.remove('show');
  setStatus('idle', 'Ready for next pull.');
}

function setStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.className = `status-bar ${type}`;
  bar.innerHTML = type === 'loading' ? `<span class="spinner"></span>${msg}` : msg;
}
</script>
</body>
</html>
